<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Pro - Glassmorphism Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .glass-dark {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .event-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        /* Fullscreen Overlay Styles */
        #fullscreen-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            min-width: 120px;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        input::placeholder { color: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 space-y-4 md:space-y-0">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                    COUNTDOWN PRO
                </h1>
                <p class="text-gray-400 font-light mt-1">Sleek event tracking with immersive focus</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="toggleForm()" class="glass px-6 py-2 rounded-full font-semibold hover:bg-white/10 transition-colors">
                    + Add Event
                </button>
                <button onclick="testAudio()" class="glass px-6 py-2 rounded-full font-semibold text-xs opacity-50 hover:opacity-100 transition-all">
                    🔊 Test Alert
                </button>
            </div>
        </header>

        <!-- Add Event Form (Hidden by default) -->
        <section id="event-form" class="glass rounded-3xl p-6 mb-12 hidden transition-all">
            <h2 class="text-xl font-bold mb-4">Create New Event</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs uppercase text-gray-400 mb-1 ml-1">Event Name</label>
                    <input type="text" id="input-name" placeholder="e.g. New Year 2026" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-gray-400 mb-1 ml-1">Date & Time</label>
                    <input type="datetime-local" id="input-date" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-gray-400 mb-1 ml-1">Image URL (Optional)</label>
                    <input type="text" id="input-image" placeholder="https://images.unsplash..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex items-end">
                    <button onclick="addEvent()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                        Create Event
                    </button>
                </div>
            </div>
        </section>

        <!-- Events Grid -->
        <main id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
        </main>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20 hidden">
            <div class="text-6xl mb-4 opacity-20">🕒</div>
            <p class="text-gray-500 text-lg">No events yet. Click 'Add Event' to get started.</p>
        </div>
    </div>

    <!-- Fullscreen Overlay -->
    <div id="fullscreen-overlay" class="flex items-center justify-center">
        <div class="absolute inset-0 bg-black/40 z-0"></div> <!-- Dark Overlay -->
        
        <div class="relative z-10 glass-dark p-8 md:p-16 rounded-[3rem] text-center max-w-[90vw]">
            <button onclick="exitFullscreenMode()" class="absolute top-6 right-6 text-white/50 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <h2 id="fs-title" class="text-3xl md:text-5xl font-light mb-8 tracking-widest uppercase">EVENT TITLE</h2>
            
            <div class="flex flex-wrap justify-center gap-4 md:gap-8">
                <div class="glass p-6 rounded-3xl min-w-[100px] md:min-w-[160px]">
                    <span id="fs-days" class="text-5xl md:text-8xl font-black block">00</span>
                    <span class="text-blue-400 text-xs md:text-sm uppercase tracking-widest mt-2 block">Days</span>
                </div>
                <div class="glass p-6 rounded-3xl min-w-[100px] md:min-w-[160px]">
                    <span id="fs-hours" class="text-5xl md:text-8xl font-black block">00</span>
                    <span class="text-blue-400 text-xs md:text-sm uppercase tracking-widest mt-2 block">Hours</span>
                </div>
                <div class="glass p-6 rounded-3xl min-w-[100px] md:min-w-[160px]">
                    <span id="fs-minutes" class="text-5xl md:text-8xl font-black block">00</span>
                    <span class="text-blue-400 text-xs md:text-sm uppercase tracking-widest mt-2 block">Minutes</span>
                </div>
                <div class="glass p-6 rounded-3xl min-w-[100px] md:min-w-[160px]">
                    <span id="fs-seconds" class="text-5xl md:text-8xl font-black block text-blue-500">00</span>
                    <span class="text-blue-400 text-xs md:text-sm uppercase tracking-widest mt-2 block">Seconds</span>
                </div>
            </div>

            <p id="fs-status" class="mt-12 text-white/40 text-sm tracking-widest uppercase"></p>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="alert-audio" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <script>
        // State Management
        let events = JSON.parse(localStorage.getItem('countdown-events')) || [];
        let activeFullscreenId = null;
        const alertAudio = document.getElementById('alert-audio');

        // Init
        window.onload = () => {
            renderEvents();
            setInterval(updateAllCountdowns, 1000);
        };

        // Functions
        function toggleForm() {
            const form = document.getElementById('event-form');
            form.classList.toggle('hidden');
        }

        function addEvent() {
            const name = document.getElementById('input-name').value;
            const date = document.getElementById('input-date').value;
            const img = document.getElementById('input-image').value || 'https://images.unsplash.com/photo-1467810563316-b5476525c0f9?auto=format&fit=crop&q=80&w=2069';

            if (!name || !date) {
                alert("Please provide both a name and a date!");
                return;
            }

            const newEvent = {
                id: Date.now().toString(),
                name,
                date: new Date(date).getTime(),
                imageUrl: img,
                notified: false
            };

            events.push(newEvent);
            saveEvents();
            renderEvents();
            toggleForm();
            
            // Reset form
            document.getElementById('input-name').value = '';
            document.getElementById('input-date').value = '';
            document.getElementById('input-image').value = '';
        }

        function deleteEvent(e, id) {
            e.stopPropagation(); // Don't trigger fullscreen
            events = events.filter(ev => ev.id !== id);
            saveEvents();
            renderEvents();
        }

        function saveEvents() {
            localStorage.setItem('countdown-events', JSON.stringify(events));
        }

        function renderEvents() {
            const grid = document.getElementById('events-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (events.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
            }

            events.sort((a, b) => a.date - b.date).forEach(event => {
                const card = document.createElement('div');
                card.className = 'event-card glass rounded-3xl p-6 cursor-pointer overflow-hidden relative group';
                card.onclick = () => enterFullscreenMode(event.id);
                
                // Background Image Hint
                const bgHint = document.createElement('div');
                bgHint.className = 'absolute inset-0 opacity-10 group-hover:opacity-20 transition-opacity bg-cover bg-center -z-10';
                bgHint.style.backgroundImage = `url('${event.imageUrl}')`;
                
                const timeLeft = calculateTime(event.date);
                const isPast = event.date < Date.now();

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-xl font-bold truncate pr-4">${event.name}</h3>
                        <button onclick="deleteEvent(event, '${event.id}')" class="text-white/30 hover:text-red-400 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center" id="timer-${event.id}">
                        ${renderTimerHTML(timeLeft, isPast)}
                    </div>
                    <p class="mt-4 text-xs text-gray-400 font-light">${new Date(event.date).toLocaleString()}</p>
                `;
                card.prepend(bgHint);
                grid.appendChild(card);
            });
        }

        function calculateTime(targetDate) {
            const difference = targetDate - Date.now();
            if (difference <= 0) return { d: 0, h: 0, m: 0, s: 0, total: 0 };

            return {
                d: Math.floor(difference / (1000 * 60 * 60 * 24)),
                h: Math.floor((difference / (1000 * 60 * 60)) % 24),
                m: Math.floor((difference / 1000 / 60) % 60),
                s: Math.floor((difference / 1000) % 60),
                total: difference
            };
        }

        function renderTimerHTML(t, isPast) {
            if (isPast) return `<div class="col-span-4 py-2 text-blue-400 font-bold tracking-widest">EVENT COMPLETED</div>`;
            return `
                <div><span class="text-xl font-bold block">${t.d}</span><span class="text-[10px] text-gray-500 uppercase">Days</span></div>
                <div><span class="text-xl font-bold block">${t.h}</span><span class="text-[10px] text-gray-500 uppercase">Hrs</span></div>
                <div><span class="text-xl font-bold block">${t.m}</span><span class="text-[10px] text-gray-500 uppercase">Min</span></div>
                <div><span class="text-xl font-bold block text-blue-400">${t.s}</span><span class="text-[10px] text-gray-500 uppercase">Sec</span></div>
            `;
        }

        function updateAllCountdowns() {
            events.forEach(event => {
                const timerContainer = document.getElementById(`timer-${event.id}`);
                const timeLeft = calculateTime(event.date);
                const isPast = event.date < Date.now();

                // Check for completion audio
                if (isPast && !event.notified) {
                    playAlert();
                    event.notified = true;
                    saveEvents();
                    renderEvents(); // Re-render to show completion state
                }

                if (timerContainer) {
                    timerContainer.innerHTML = renderTimerHTML(timeLeft, isPast);
                }

                // Update fullscreen if active
                if (activeFullscreenId === event.id) {
                    updateFullscreenUI(event.name, timeLeft, isPast);
                }
            });
        }

        // Fullscreen Logic
        function enterFullscreenMode(id) {
            const event = events.find(e => e.id === id);
            if (!event) return;

            activeFullscreenId = id;
            const overlay = document.getElementById('fullscreen-overlay');
            overlay.style.display = 'flex';
            overlay.style.backgroundImage = `url('${event.imageUrl}')`;
            
            // Request browser fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            const timeLeft = calculateTime(event.date);
            updateFullscreenUI(event.name, timeLeft, event.date < Date.now());
        }

        function exitFullscreenMode() {
            activeFullscreenId = null;
            document.getElementById('fullscreen-overlay').style.display = 'none';
            if (document.exitFullscreen && document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        function updateFullscreenUI(name, t, isPast) {
            document.getElementById('fs-title').innerText = name;
            document.getElementById('fs-days').innerText = String(t.d).padStart(2, '0');
            document.getElementById('fs-hours').innerText = String(t.h).padStart(2, '0');
            document.getElementById('fs-minutes').innerText = String(t.m).padStart(2, '0');
            document.getElementById('fs-seconds').innerText = String(t.s).padStart(2, '0');
            
            const status = document.getElementById('fs-status');
            if (isPast) {
                status.innerText = "Target Reached";
                status.classList.add('pulse', 'text-blue-400');
            } else {
                status.innerText = "Time Remaining";
                status.classList.remove('pulse', 'text-blue-400');
            }
        }

        function playAlert() {
            alertAudio.currentTime = 0;
            alertAudio.play().catch(e => console.log("Audio play prevented by browser policy"));
        }

        function testAudio() {
            playAlert();
            const btn = event.target;
            btn.innerText = "✅ Playing...";
            setTimeout(() => btn.innerText = "🔊 Test Alert", 2000);
        }

        // Handle Escape key for fullscreen
        document.onfullscreenchange = () => {
            if (!document.fullscreenElement) {
                exitFullscreenMode();
            }
        };
    </script>
</body>
</html>
